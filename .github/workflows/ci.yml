name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/memory/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-native:
    name: Test on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: Linux
            arch: x86_64
            runner: ubuntu-latest
          # macOS x86_64 (Intel)
          - os: macOS
            arch: x86_64
            runner: macos-13
          # macOS ARM64 (Apple Silicon)
          - os: macOS
            arch: ARM64
            runner: macos-latest
          # Windows x86_64
          - os: Windows
            arch: x86_64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clean Cache (Windows workaround)
        if: matrix.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path .zig-cache) {
            Remove-Item -Path .zig-cache -Recurse -Force -ErrorAction SilentlyContinue
          }
          if (Test-Path zig-out) {
            Remove-Item -Path zig-out -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Build
        run: zig build

      - name: Run Tests
        run: zig build test

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: Build ReleaseSmall
        run: zig build -Doptimize=ReleaseSmall

      - name: Build ReleaseFast
        run: zig build -Doptimize=ReleaseFast

  cross-compile:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: test-native
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - x86_64-macos-none
          - aarch64-macos-none
          - x86_64-windows-msvc
          - aarch64-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test-native
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comparison

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build Benchmark Executable
        run: zig build benchmark

      - name: Run Current Benchmarks
        run: ./zig-out/bin/benchmark 2>&1 | tee benchmark-current.txt

      - name: Get Baseline from Main Branch
        if: github.event_name == 'pull_request'
        run: |
          # Fetch baseline from main branch artifact (if available)
          gh run list --branch main --workflow ci.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId' > main_run_id.txt || echo "0" > main_run_id.txt
          MAIN_RUN_ID=$(cat main_run_id.txt)
          if [ "$MAIN_RUN_ID" != "0" ]; then
            gh run download $MAIN_RUN_ID --name benchmark-results --dir baseline || echo "No baseline found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Baseline Benchmarks (fallback)
        if: github.event_name == 'pull_request' && !hashFiles('baseline/benchmark-current.txt')
        run: |
          # Build baseline from main branch
          git fetch origin main
          git checkout origin/main
          zig build benchmark
          ./zig-out/bin/benchmark 2>&1 | tee benchmark-baseline.txt
          git checkout -

      - name: Detect Regressions
        if: github.event_name == 'pull_request'
        run: |
          if [ -f baseline/benchmark-current.txt ]; then
            BASELINE_FILE=baseline/benchmark-current.txt
          elif [ -f benchmark-baseline.txt ]; then
            BASELINE_FILE=benchmark-baseline.txt
          else
            echo "No baseline found - skipping regression detection"
            exit 0
          fi

          zig run scripts/check_benchmarks.zig -- benchmark-current.txt $BASELINE_FILE 2>&1 | tee regression-report.txt
          REGRESSION_EXIT=$?

          echo "## Benchmark Regression Report" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat regression-report.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          exit $REGRESSION_EXIT

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-current.txt
          retention-days: 90
