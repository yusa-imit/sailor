name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.claude/memory/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-native:
    name: Test on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: Linux
            arch: x86_64
            runner: ubuntu-latest
          # macOS x86_64 (Intel)
          - os: macOS
            arch: x86_64
            runner: macos-13
          # macOS ARM64 (Apple Silicon)
          - os: macOS
            arch: ARM64
            runner: macos-latest
          # Windows x86_64
          - os: Windows
            arch: x86_64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Run Tests
        run: zig build test

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

      - name: Build ReleaseSmall
        run: zig build -Doptimize=ReleaseSmall

      - name: Build ReleaseFast
        run: zig build -Doptimize=ReleaseFast

  cross-compile:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: test-native
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - x86_64-macos-none
          - aarch64-macos-none
          - x86_64-windows-msvc
          - aarch64-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build for ${{ matrix.target }}
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test-native
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comparison

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build Benchmarks
        run: zig build benchmark

      - name: Run Benchmarks
        run: zig build benchmark | tee benchmark-results.txt

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

      - name: Performance Regression Detection
        if: github.event_name == 'pull_request'
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat benchmark-results.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Compare with main branch results to detect regressions." >> $GITHUB_STEP_SUMMARY
